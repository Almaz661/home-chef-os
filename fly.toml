# Fly.io configuration. Database — внешний Neon PostgreSQL (DATABASE_URL),
# поэтому persistent volume больше не нужен.
#
# Setup (один раз):
#   curl -L https://fly.io/install.sh | sh
#   flyctl auth signup
#   flyctl launch --no-deploy
#   flyctl secrets set DATABASE_URL='postgres://...?sslmode=require'
#   flyctl secrets set OCR_SPACE_API_KEY=...   # опционально
#   flyctl secrets set DEEPL_API_KEY=...       # опционально
#   flyctl deploy

app = "home-chef-os"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
