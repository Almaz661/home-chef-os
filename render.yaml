# Render.com Blueprint для ШефДома.
#
# С переходом на Neon PostgreSQL данные больше НЕ зависят от persistent
# disk на Render. Можно использовать любой план, включая Free, без потери
# данных при засыпании / передеплое.
#
# ПЕРЕД ДЕПЛОЕМ обязательно установите DATABASE_URL в Render Dashboard:
#   1. Откройте https://console.neon.tech, выберите проект
#   2. Connection Details → "Pooled connection"
#   3. Скопируйте connection string (postgres://...?sslmode=require)
#   4. В Render Dashboard → ваш сервис → Environment → Add → DATABASE_URL
#
# Использование:
#   1. https://dashboard.render.com/blueprints → New Blueprint Instance
#   2. Подключите репо Almaz661/home-chef-os
#   3. После создания сервиса добавьте DATABASE_URL в Environment

services:
  - type: web
    name: home-chef-os
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: false  # ОТКЛЮЧЕНО — деплоим вручную, чтобы не терять данные при пушах
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      # ОБЯЗАТЕЛЬНО — Neon connection string. Установите вручную в Dashboard.
      - key: DATABASE_URL
        sync: false
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: DEEPL_API_KEY
        sync: false
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
